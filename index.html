<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow AI | Professional Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar { transition: all 0.3s ease; }
        .chat-input { background: rgba(30, 30, 30, 0.8); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .chat-input:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); outline: none; }
        .gradient-text { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-72 sidebar glass h-full flex flex-col p-5 z-20">
        <div class="flex items-center gap-3 mb-8 px-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <i class="fa-solid fa-brain text-white"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Snow <span class="text-blue-500">AI</span></h1>
        </div>

        <button onclick="novoChat()" class="w-full flex items-center gap-3 bg-white/5 hover:bg-white/10 p-4 rounded-2xl border border-white/10 transition mb-6">
            <i class="fa-solid fa-plus text-sm"></i>
            <span class="text-sm font-semibold">Novo Chat</span>
        </button>

        <nav class="flex-1 overflow-y-auto space-y-2 pr-2" id="historico">
            <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-4 px-2">Recentes</p>
            <!-- Os chats salvos aparecerão aqui -->
        </nav>

        <div class="mt-auto pt-6 border-t border-white/10 space-y-4">
            <button class="flex items-center gap-3 text-gray-400 hover:text-white transition w-full px-2">
                <i class="fa-solid fa-key text-sm"></i>
                <span class="text-sm">Minha Chave API</span>
            </button>
            <button class="flex items-center gap-3 text-gray-400 hover:text-white transition w-full px-2">
                <i class="fa-solid fa-sliders text-sm"></i>
                <span class="text-sm">Configurações</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative">
        <!-- Header -->
        <header class="p-4 flex justify-end gap-4">
            <div class="glass px-4 py-2 rounded-full text-xs font-bold border-blue-500/30 text-blue-400">Status: Master PRO</div>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-purple-600 border-2 border-white/20"></div>
        </header>

        <!-- Chat Area -->
        <section class="flex-1 flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
            <div id="welcome-screen" class="max-w-2xl">
                <h2 class="text-5xl font-bold mb-4">Olá, <span class="gradient-text">Minezin</span></h2>
                <p class="text-gray-400 text-lg mb-12">Eu sou sua IA pessoal. Posso gerar sites, vídeos, músicas e scripts profissionais agora mesmo.</p>
                
                <!-- Modos de Operação -->
                <div class="grid grid-cols-3 gap-4 mb-10">
                    <button class="glass p-6 rounded-3xl hover:border-blue-500 transition group">
                        <i class="fa-solid fa-bolt text-yellow-400 text-2xl mb-3"></i>
                        <h3 class="font-bold">Rápido</h3>
                        <p class="text-[10px] text-gray-500">Respostas instantâneas</p>
                    </button>
                    <button class="glass p-6 rounded-3xl hover:border-purple-500 transition">
                        <i class="fa-solid fa-microchip text-purple-500 text-2xl mb-3"></i>
                        <h3 class="font-bold">Raciocínio</h3>
                        <p class="text-[10px] text-gray-500">Lógica avançada</p>
                    </button>
                    <button class="glass p-6 rounded-3xl border-orange-500/50 hover:border-orange-500 transition">
                        <i class="fa-solid fa-crown text-orange-500 text-2xl mb-3"></i>
                        <h3 class="font-bold">Pro</h3>
                        <p class="text-[10px] text-gray-500">Perfeição absoluta</p>
                    </button>
                </div>
            </div>

            <!-- Area onde as mensagens aparecem -->
            <div id="chat-messages" class="w-full max-w-3xl space-y-6 hidden"></div>
        </section>

        <!-- Input Box -->
        <footer class="p-8 flex justify-center">
            <div class="w-full max-w-3xl relative">
                <textarea id="user-input" rows="1" placeholder="Peça para criar um site, vídeo ou música..." 
                    class="w-full p-5 rounded-3xl chat-input resize-none pr-20 min-h-[64px] max-h-[200px]"></textarea>
                <div class="absolute right-3 bottom-3 flex gap-2">
                    <button class="w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:text-white transition">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>
                    <button onclick="enviarMensagem()" class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
